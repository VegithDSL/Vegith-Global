kind = "web"
previewPath = "/"
title = "Vegith Global Services"
version = "1.0.0"
id = "artifacts/vegith-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21433

[services.development]
run = "pnpm --filter @workspace/vegith-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vegith-website", "run", "build" ]
publicDir = "artifacts/vegith-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21433"
BASE_PATH = "/"
